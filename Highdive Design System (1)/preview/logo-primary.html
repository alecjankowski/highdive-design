<!doctype html>
<html><head><meta charset="utf-8"><title>Primary Logo</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; height: 240px; padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
  .pane.cream  { background: #F4EFE5; }
  .pane.orange { background: #FF3014; }
  .pane.black  { background: #0A0A0A; }
  img { max-width: 100%; max-height: 100%; display: block; }
  .label { position: absolute; bottom: 10px; left: 12px; font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
</style></head>
<body>
  <div class="card">
    <div class="pane cream">
      <img src="../assets/logos/Primary_Logo/Highdive_PrimaryLogo_Orange.png" alt="Highdive primary logo orange">
      <div class="label" style="color:#0A0A0A">Primary · Orange on Cream</div>
    </div>
    <div class="pane orange">
      <img src="../assets/logos/Primary_Logo/Highdive_PrimaryLogo_White.png" alt="Highdive primary logo white">
      <div class="label" style="color:#FFFFFF">Primary · White on Orange</div>
    </div>
  </div>
</body></html>
