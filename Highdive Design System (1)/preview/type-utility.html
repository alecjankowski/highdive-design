<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow + Script</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; padding: 28px; background: #F4EFE5; color: #0A0A0A; display: flex; gap: 24px; align-items: stretch; }
  .col { flex: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
  .col + .col { border-left: 1px solid rgba(10,10,10,0.15); padding-left: 24px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.55; }
  .eyebrow-demo { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; line-height: 1; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .script-demo { font-family: "Pacifico", "Bradley Hand", cursive; font-size: 54px; line-height: 1.0; color: #FF3014; }
  .meta { font-size: 11px; opacity: 0.6; letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="card">
    <div class="col">
      <div class="label">Eyebrow / Label</div>
      <div class="stack">
        <div class="eyebrow-demo">— Case Study · 2025</div>
        <div class="eyebrow-demo" style="color:#FF3014">Featured Work</div>
        <div class="eyebrow-demo" style="opacity:0.55">Filed Under · Branding</div>
      </div>
      <div class="meta">13 / 700 · 0.22em tracking · uppercase</div>
    </div>
    <div class="col">
      <div class="label">Script · Signature</div>
      <div class="script-demo">Highdive</div>
      <div class="meta">Pacifico — used for the friendly aside / signature only. Never body copy.</div>
    </div>
  </div>
</body></html>
