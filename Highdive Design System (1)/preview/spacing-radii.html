<!doctype html>
<html><head><meta charset="utf-8"><title>Radii &amp; Stroke</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; padding: 24px 28px; background: #F4EFE5; color: #0A0A0A; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 16px; align-items: center; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.55; flex-basis: 100%; }
  .sw { width: 72px; height: 72px; background: #0A0A0A; display: flex; align-items: center; justify-content: center; color: #F4EFE5; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-align: center; line-height: 1.2; }
  .r0 { border-radius: 0; }
  .r1 { border-radius: 2px; }
  .r2 { border-radius: 6px; }
  .rp { border-radius: 999px; width: 110px; }
  .stroke { width: 100%; background: transparent; }
  .s1 { border-top: 1.5px solid #0A0A0A; }
  .s2 { border-top: 2.5px solid #0A0A0A; }
  .s3 { border-top: 4px solid #0A0A0A; }
  .row2 { display: grid; grid-template-columns: 60px 1fr 80px; gap: 14px; align-items: center; font-size: 12px; }
</style></head>
<body>
  <div class="card">
    <div class="row">
      <div class="label">Radii — sharp by default, pill for CTAs only</div>
      <div class="sw r0">0<br>sharp</div>
      <div class="sw r1">2px<br>input</div>
      <div class="sw r2">6px<br>chip</div>
      <div class="sw rp">999px<br>pill</div>
    </div>
    <div class="row" style="display:block">
      <div class="label" style="margin-bottom:10px">Stroke widths · primary divider colour = Highdive Green</div>
      <div class="row2"><span style="font-weight:700">1.5 px</span><div class="stroke s1"></div><span style="opacity:.6">--stroke-1</span></div>
      <div class="row2"><span style="font-weight:700">2.5 px</span><div class="stroke s2"></div><span style="opacity:.6">--stroke-2</span></div>
      <div class="row2"><span style="font-weight:700">4.0 px</span><div class="stroke s3"></div><span style="opacity:.6">--stroke-3</span></div>
    </div>
  </div>
</body></html>
