<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; padding: 28px; background: #F4EFE5; color: #0A0A0A; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.55; flex-basis: 100%; }

  .btn {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 26px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: background 220ms cubic-bezier(.2,.8,.2,1), transform 140ms ease;
    line-height: 1;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn.primary { background: #0A0A0A; color: #F4EFE5; }
  .btn.primary:hover { background: #000000; }
  .btn.orange  { background: #FF3014; color: #FFFFFF; }
  .btn.orange:hover { background: #E62200; }
  .btn.ghost   { background: transparent; color: #0A0A0A; box-shadow: inset 0 0 0 1.5px #0A0A0A; }
  .btn.ghost:hover { background: #0A0A0A; color: #F4EFE5; }
  .btn.text    { background: transparent; color: #0A0A0A; padding: 6px 0; border-radius: 0; }
  .btn.text:hover { color: #FF3014; }
  .btn.text::after { content: " →"; }

  .btn.sm { font-size: 12px; padding: 10px 18px; letter-spacing: 0.1em; }
  .btn.lg { font-size: 16px; padding: 18px 34px; }
</style></head>
<body>
  <div class="card">
    <div class="row">
      <div class="label">CTA Buttons · Pill · Uppercase tracked</div>
      <button class="btn primary">Jump in</button>
      <button class="btn orange">See the work</button>
      <button class="btn ghost">Get in touch</button>
      <button class="btn text">Read more</button>
    </div>
    <div class="row">
      <div class="label">Sizes</div>
      <button class="btn primary sm">Small</button>
      <button class="btn primary">Default</button>
      <button class="btn primary lg">Large</button>
    </div>
  </div>
</body></html>
