<!doctype html>
<html><head><meta charset="utf-8"><title>Diver Treatment</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; height: 280px; padding: 0; display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .pane { display: flex; align-items: center; justify-content: center; padding: 18px; position: relative; overflow: hidden; }
  .pane img { max-width: 100%; max-height: 100%; }
  .cream  { background: #F4EFE5; }
  .orange { background: #FF3014; }
  .black  { background: #0A0A0A; }
  .cap { position: absolute; bottom: 10px; left: 14px; right: 14px; font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
</style></head>
<body>
  <div class="card">
    <div class="pane cream">
      <img src="../assets/logos/Diver/Diver_Orange.png">
      <div class="cap" style="color:#0A0A0A">Diver · Orange on Cream</div>
    </div>
    <div class="pane orange">
      <img src="../assets/logos/Diver/Diver_White.png">
      <div class="cap" style="color:#FFFFFF">Diver · White on Orange</div>
    </div>
    <div class="pane black">
      <img src="../assets/logos/Diver/Diver_Orange.png">
      <div class="cap" style="color:#F4EFE5">Diver · Orange on Black</div>
    </div>
  </div>
</body></html>
