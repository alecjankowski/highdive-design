<!doctype html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { width: 700px; height: 260px; background: #FF3014; color: #FFFFFF; padding: 24px 28px; display: flex; flex-direction: column; justify-content: space-between; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7; display: flex; justify-content: space-between; }
  .specimen { font-family: var(--font-display); font-weight: 900; line-height: 0.82; letter-spacing: -0.01em; text-transform: uppercase; font-size: 160px; }
  .meta { font-size: 12px; font-weight: 500; opacity: 0.82; letter-spacing: 0.02em; }
</style></head>
<body>
  <div class="card">
    <div class="label"><span>Display · Mega</span><span>ABC Gravity Compressed</span></div>
    <div class="specimen">HIGHDIVE</div>
    <div class="meta">160 / 0.82 · uppercase · tracking -1% — brand display face, used for hero moments and section markers</div>
  </div>
</body></html>
