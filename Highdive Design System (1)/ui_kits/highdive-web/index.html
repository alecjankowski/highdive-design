<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Highdive — Fearless creative for the brave.</title>
  <link rel="stylesheet" href="kit.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="WorkGrid.jsx"></script>
  <script type="text/babel" src="StudioStrip.jsx"></script>
  <script type="text/babel" src="AboutBlock.jsx"></script>
  <script type="text/babel" src="ContactForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="CaseStudyPanel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [active, setActive] = useState("Work");
      const [openWork, setOpenWork] = useState(null);

      function navigate(name){
        setActive(name);
        const target = {
          "Home": "top", "Work": "work", "Studio": "studio",
          "Culture": "studio", "News": "studio", "Contact": "contact"
        }[name];
        if (target === "top") { window.scrollTo({top: 0, behavior: "smooth"}); return; }
        const el = document.getElementById(target);
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY - 76;
          window.scrollTo({top, behavior: "smooth"});
        }
      }

      return (
        <React.Fragment>
          <a id="top"></a>
          <Nav active={active} onNavigate={navigate} />
          <Hero onCTA={navigate} />
          <WorkGrid onOpen={(w)=>setOpenWork(w)} />
          <StudioStrip />
          <AboutBlock />
          <ContactForm />
          <Footer />
          <CaseStudyPanel open={!!openWork} work={openWork} onClose={()=>setOpenWork(null)} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
